    <line x1="720" y1="0" x2="720" y2="600" stroke="white" stroke-width="1"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
