  <rect x="520" y="300" width="50" height="50" rx="6" fill="#334155"/>
  <rect x="578" y="300" width="50" height="50" rx="6" fill="#334155"/>
  <rect x="636" y="300" width="50" height="50" rx="6" fill="#334155"/>
  <rect x="694" y="300" width="50" height="50" rx="6" fill="#334155"/>
