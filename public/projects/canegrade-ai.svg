  <rect x="60" y="535" width="65" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
  <text x="92" y="550" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">Python</text>
  <rect x="135" y="535" width="75" height="22" rx="11" fill="#ef4444" opacity="0.15"/>
  <text x="172" y="550" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10">Streamlit</text>
  <rect x="220" y="535" width="85" height="22" rx="11" fill="#f97316" opacity="0.15"/>
  <text x="262" y="550" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="10">Scikit-Learn</text>
  <rect x="315" y="535" width="65" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
  <text x="347" y="550" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">Pandas</text>
  <rect x="390" y="535" width="60" height="22" rx="11" fill="#06b6d4" opacity="0.15"/>
  <text x="420" y="550" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10">NumPy</text>
