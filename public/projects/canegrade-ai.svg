  <text x="187" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">S3</text>
  <text x="237" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">S4</text>
  <text x="287" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">S5</text>
  <text x="337" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">S6</text>
  <text x="387" y="310" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">S7</text>
