  <text x="60" y="455" fill="#22c55e" font-family="monospace" font-size="32" font-weight="bold">247</text>
  <rect x="230" y="390" width="170" height="90" rx="12" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="250" y="418" fill="#64748b" font-family="sans-serif" font-size="11">Avg Recovery</text>
  <text x="250" y="455" fill="#22c55e" font-family="monospace" font-size="32" font-weight="bold">9.6%</text>
  <rect x="420" y="390" width="170" height="90" rx="12" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="440" y="418" fill="#64748b" font-family="sans-serif" font-size="11">Financial Impact</text>
  <text x="440" y="455" fill="#22c55e" font-family="monospace" font-size="28" font-weight="bold">₹1.2M</text>
  <rect x="610" y="390" width="150" height="90" rx="12" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="630" y="418" fill="#64748b" font-family="sans-serif" font-size="11">Accuracy</text>
  <text x="630" y="455" fill="#22c55e" font-family="monospace" font-size="32" font-weight="bold">94%</text>
