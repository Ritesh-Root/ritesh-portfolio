  <line x1="525" y1="315" x2="565" y2="315" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <line x1="525" y1="325" x2="565" y2="325" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <line x1="525" y1="335" x2="565" y2="335" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
